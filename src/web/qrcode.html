<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>waylay» login · /qrcode</title>
  <link rel="icon" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/static/design.css">
  <link rel="stylesheet" href="/static/app.css">
  <script defer src="/static/app.js"></script>
</head>
<body>
<div class="wl-shell">

  <header class="wl-topnav">
    <div class="wl-topnav__brand">
      <a href="/" class="wl-topnav__logo" aria-label="Waylay home">
        <svg width="28" height="28" viewBox="0 0 64 64" fill="none" aria-hidden="true">
          <rect x="2" y="2" width="60" height="60" rx="3" stroke="currentColor" stroke-width="2.5"/>
          <path d="M14 22 L28 32 L14 42" stroke="currentColor" stroke-width="3.5" fill="none"/>
          <path d="M30 22 L44 32 L30 42" stroke="var(--wl-accent)" stroke-width="3.5" fill="none"/>
        </svg>
        <span class="wl-topnav__wordmark">waylay<span class="accent">»</span></span>
      </a>
      <nav class="wl-topnav__nav">
        <a href="/" class="wl-topnav__link">Home</a>
        <a href="/docs" class="wl-topnav__link">Docs</a>
        <a href="/qrcode" class="wl-topnav__link is-active">/qrcode</a>
      </nav>
    </div>
    <div class="wl-topnav__right">
      <button class="wl-topnav__icon-btn" data-action="toggle-theme" aria-label="Toggle theme" title="Toggle theme">
        <svg data-theme-icon="moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><path d="M20 14 A8 8 0 1 1 10 4 A6 6 0 0 0 20 14Z"/></svg>
        <svg data-theme-icon="sun" hidden width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4" y1="12" x2="2" y2="12"/><line x1="22" y1="12" x2="20" y2="12"/><line x1="5" y1="5" x2="7" y2="7"/><line x1="17" y1="17" x2="19" y2="19"/><line x1="5" y1="19" x2="7" y2="17"/><line x1="17" y1="7" x2="19" y2="5"/></svg>
      </button>
    </div>
  </header>

  <main class="wl-qr-page">
    <div class="wl-card wl-qr-card">
      <div class="wl-card__header">
        <span><span class="wl-dot wl-dot--live"></span>bridge · :13000/qrcode</span>
        <span class="wl-badge wl-badge--warn" data-status="login-pill">waiting</span>
      </div>
      <div class="wl-qr-card__body">
        <div class="wl-qr-frame">
          <img alt="Login QR code" data-qr-img width="220" height="220"
               src="/qrcode.png"
               style="width:220px;height:220px;image-rendering:pixelated;background:var(--wl-bg-2)">
          <div class="wl-qr-meta__hint" data-qr-empty hidden
               style="position:absolute;inset:20px;font-family:var(--wl-font-mono);font-size:13px;color:var(--wl-fg-3);text-align:center;width:220px;height:220px;display:flex;align-items:center;justify-content:center;background:var(--wl-bg-2);border:1px dashed var(--wl-rule-strong)">
            no qr available yet<br><br>waiting for kernel
          </div>
          <div class="wl-qr-frame__overlay wl-qr-frame__overlay--ok" data-qr-loggedin hidden>
            <span style="display:inline-flex;align-items:center;gap:6px">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><polyline points="20 6 9 17 4 12"/></svg>
              <span data-qr-loggedin-label>logged in</span>
            </span>
          </div>
        </div>
        <div class="wl-qr-meta">
          <div class="wl-qr-meta__primary">Scan with QQ Mobile</div>
          <div class="wl-small wl-qr-meta__hint">Or set <code>AUTO_LOGIN_QQ</code> to skip the scan on restart.</div>
        </div>
        <div class="wl-qr-foot">
          <span class="wl-micro" data-qr-status>
            <span class="wl-dot wl-dot--warn"></span>checking…
          </span>
          <button class="wl-qr-foot__refresh" data-action="refresh-qr">refresh qr</button>
        </div>
      </div>
    </div>
  </main>

  <footer class="wl-footer">
    <span>waylay · login</span>
    <span><a href="/qrcode.png">/qrcode.png</a> · <a href="/api/status">/api/status</a></span>
  </footer>
</div>

<script>
  // Mirror status into the header pill once /api/status responds.
  (function () {
    function updatePill() {
      fetch("/api/status").then(function (r) { return r.json(); }).then(function (s) {
        var pill = document.querySelector("[data-status='login-pill']");
        if (!pill) return;
        if (s.logged_in) {
          pill.className = "wl-badge wl-badge--ok";
          pill.textContent = s.uin ? "logged in · " + s.uin : "logged in";
        } else {
          pill.className = "wl-badge wl-badge--warn";
          pill.textContent = "waiting";
        }
      }).catch(function () {});
    }
    updatePill();
    setInterval(updatePill, 3000);
  })();
</script>
</body>
</html>
