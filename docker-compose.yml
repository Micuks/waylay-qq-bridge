version: '3.8'

services:
  qq-bridge:
    build: .
    container_name: qq-bridge
    privileged: true
    ports:
      - "13000:13000"
      - "3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - BRIDGE_PORT=13000
      - BRIDGE_HOST=0.0.0.0
      - AUTO_LOGIN_QQ=3597656306
      # OneBot v11: forward WS server on port 3001
      - ONEBOT_WS_PORT=3001
      - ONEBOT_WS_HOST=0.0.0.0
      # OneBot v11: reverse WS to TRSS-Yunzai
      - ONEBOT_WS_REVERSE_URLS=["ws://host.docker.internal:2536/OneBotv11"]
      - ONEBOT_TOKEN=
    networks:
      - app_network
    volumes:
      - qq_volume:/root/.config/QQ

volumes:
  qq_volume:

networks:
  app_network:
    driver: bridge
