version: '3.8'

services:
  qq-bridge:
    build: .
    container_name: qq-bridge
    privileged: true
    ports:
      - "13000:13000"
      - "3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - BRIDGE_PORT=13000
      - BRIDGE_HOST=0.0.0.0
      - AUTO_LOGIN_QQ=3597656306
      # OneBot v11: forward WS server on port 3001
      - ONEBOT_WS_PORT=3001
      - ONEBOT_WS_HOST=0.0.0.0
      # OneBot v11: reverse WS to TRSS-Yunzai
      - ONEBOT_WS_REVERSE_URLS=["ws://host.docker.internal:2536/OneBotv11"]
      - ONEBOT_TOKEN=
    networks:
      - app_network
    volumes:
      - qq_volume:/root/.config/QQ
      - llob_data:/app/llonebot/data

  llonebot:
    image: docker.1ms.run/linyuchen/llonebot:latest
    ports:
      - "3081:3080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # LLOneBot env vars (names required by LLOneBot)
      - PMHQ_HOST=qq-bridge
      - PMHQ_PORT=13000
      - ENABLE_ONEBOT_WS=false
      - ENABLE_ONEBOT_HTTP=false
      - ONEBOT_WS_PORT=3001
      - ONEBOT_HTTP_PORT=3000
      - ONEBOT_WS_URLS=["ws://host.docker.internal:8080/onebot/v11/ws"]
      - ONEBOT_HTTP_URLS=[]
      - ONEBOT_TOKEN=jil,m.
      - ONEBOT_SECRET=
      - ENABLE_SATORI=false
      - SATORI_PORT=5600
      - SATORI_TOKEN=jil,m.
      - ENABLE_WEBUI=true
      - WEBUI_PORT=3080
      - WEBUI_TOKEN=jil,m.
    networks:
      - app_network
    volumes:
      - qq_volume:/root/.config/QQ
      - llob_data:/app/llonebot/data
    depends_on:
      - qq-bridge

volumes:
  qq_volume:
  llob_data:

networks:
  app_network:
    driver: bridge
