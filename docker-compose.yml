services:
  waylay:
    image: micuks/waylay:latest
    # To build from source instead, comment out 'image' and uncomment 'build':
    # build: .
    container_name: waylay
    privileged: true
    ports:
      - "13000:13000"   # Bridge WebSocket / QR code login page
      - "3001:3001"     # OneBot v11 forward WebSocket
      # - "8082:8082"   # Milky protocol HTTP/WS/SSE
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - BRIDGE_PORT=13000
      - BRIDGE_HOST=0.0.0.0
      # Quick login: set your QQ number to skip QR code
      # - AUTO_LOGIN_QQ=123456789
      # OneBot v11 forward WebSocket
      - ONEBOT_WS_PORT=3001
      - ONEBOT_WS_HOST=0.0.0.0
      # OneBot v11 reverse WebSocket (JSON array of URLs)
      - ONEBOT_WS_REVERSE_URLS=["ws://host.docker.internal:2536/OneBotv11"]
      - ONEBOT_TOKEN=
      # Milky protocol (uncomment to enable)
      # - MILKY_HTTP_PORT=8082
      # - MILKY_TOKEN=
    volumes:
      - qq_data:/root/.config/QQ

volumes:
  qq_data:
